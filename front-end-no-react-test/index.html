<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Finder</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Features
                        </a>
                        <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <a class="dropdown-item" href="#">Feature 1</a>
                            <a class="dropdown-item" href="#">Feature 2</a>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item" href="#">Feature 3</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                </ul>
            </div>
            <a class="navbar-brand ml-auto" href="#">Car Finder</a>
        </nav>
    </header>

    <!-- Container -->
    <div class="container mt-5 pt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-4 small-frame">
                <div class="frame">
                    <h5>Search for a Car -</h5> <!-- Dash added -->
                    <div class="search-bar">
                        <input type="text" class="form-control" placeholder="Enter car name">
                        <button class="btn mt-2">Search</button>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="frame large-frame">
                    <h5>Available Cars -</h5> <!-- Dash added -->
                    <p>List of cars will be displayed here.</p>
                    <!-- Add car listings here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Car Finder. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
